<!--
AI Usage Extension 插件 Logo
修改日期: 2026-04-24
修改人: qiweizhe
修改目的: 为 AI Usage Extension VSCode 扩展插件创建专业的 logo
主要功能: 128x128 像素的平面化、单色、蓝色调的技术风格 SVG logo
设计元素:
- 方形边框代表监控屏幕
- 柱状图代表 API 使用数据
- 连接线和节点代表 AI API 连接
-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 外边框 - 方形监控屏幕 -->
  <rect x="16" y="16" width="96" height="96" fill="none" stroke="#2196F3" stroke-width="4"/>
  
  <!-- 数据柱状图 - 代表 API 使用监控 -->
  <rect x="28" y="80" width="12" height="20" fill="#2196F3"/>
  <rect x="50" y="65" width="12" height="35" fill="#1976D2"/>
  <rect x="72" y="72" width="12" height="28" fill="#2196F3"/>
  <rect x="94" y="55" width="12" height="45" fill="#1976D2"/>
  
  <!-- 顶部连接节点 - 代表 AI API 连接 -->
  <line x1="32" y1="36" x2="96" y2="36" stroke="#2196F3" stroke-width="2"/>
  <circle cx="32" cy="36" r="6" fill="#64B5F6"/>
  <circle cx="64" cy="36" r="6" fill="#64B5F6"/>
  <circle cx="96" cy="36" r="6" fill="#64B5F6"/>
</svg>
